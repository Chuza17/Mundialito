<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Mundialito</title>
    <script>
      const repoBase = '/Mundialito/'
      const currentPath = window.location.pathname
      const route = currentPath.startsWith(repoBase)
        ? currentPath.slice(repoBase.length)
        : ''
      const normalizedRoute = route ? `/${route}` : '/'
      window.location.replace(`${repoBase}#${normalizedRoute}${window.location.search}${window.location.hash}`)
    </script>
  </head>
  <body></body>
</html>
