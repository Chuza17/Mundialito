  <!-- Yellow diamond -->
  <polygon points="450,60 840,300 450,540 60,300" fill="#FFDF00"/>
  <!-- Blue circle -->
  <circle cx="450" cy="300" r="140" fill="#002776"/>
  <!-- White arc band -->
  <path d="M 322,355 A 140,140 0 0,1 578,355" fill="none" stroke="white" stroke-width="28"/>
