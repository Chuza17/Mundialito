  <path id="arc" d="M 322,355 A 140,140 0 0,1 578,355" fill="none"/>
  <text font-size="19" font-family="Arial, sans-serif" font-weight="bold" fill="#009C3B" letter-spacing="3">
    <textPath href="#arc" startOffset="8%">ORDEM E PROGRESSO</textPath>
  </text>
  <!-- Stars (simplified — a few representative stars) -->
  <circle cx="370" cy="250" r="6" fill="white"/>
  <circle cx="420" cy="225" r="5" fill="white"/>
  <circle cx="480" cy="220" r="7" fill="white"/>
  <circle cx="530" cy="240" r="5" fill="white"/>
  <circle cx="550" cy="280" r="6" fill="white"/>
  <circle cx="450" cy="270" r="5" fill="white"/>
  <circle cx="400" cy="275" r="4" fill="white"/>
